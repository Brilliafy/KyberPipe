name: Kyberpipe Multi-Target CI/CD & Automated Releases

on:
  push:
    branches: [ main, feature/* ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  rust-check-and-test:
    name: Rust Core & Property Tests (x86_64 / ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Formatting & Clippy Lints
        run: |
          cargo fmt --check
          cargo clippy --workspace -- -D warnings

      - name: Run Core Unit & Proptest Property Tests
        run: cargo test --workspace

  desktop-frontend-check:
    name: Vue 3 / Tauri Desktop Build & Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: desktop-app/pnpm-lock.yaml

      - name: Install Node Dependencies & Build Frontend
        run: |
          cd desktop-app
          pnpm install
          pnpm build

  android-check:
    name: Android Companion Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Gradle Lint & Test
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew lint testDebugUnitTest

  build-and-release:
    name: Compile & Sign Release Artifacts
    needs: [rust-check-and-test, desktop-frontend-check, android-check]
    if: startsWith(github.ref, 'refs/tags/v') && false # Set to true to enable automated releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Ubuntu packages for Tauri dependencies
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: desktop-app/pnpm-lock.yaml

      # 1. Compile Android APK (Release and sign)
      - name: Build Android Release APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          RELEASE_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          RELEASE_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Sign Android APK
        uses: r0adk3ll/upload-packer-action@v1
        with:
          releaseDirectory: android-app/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        continue-on-error: true

      # 2. Compile Tauri Desktop App (.deb, .AppImage)
      - name: Build Tauri Desktop release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: desktop-app
          tagName: ${{ github.ref_name }}
          releaseName: 'KyberPipe Release ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false

      # 3. Compile Flatpak package
      - name: Set up Flatpak builder dependencies
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Import GPG Key for Flatpak signing
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
        continue-on-error: true

      - name: Build Flatpak Bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: KyberPipe.flatpak
          manifest-path: flatpak/io.github.brilliafy.kyberpipe.yaml
          repository-name: flathub
          run-tests: false
          # GPG signs flatpak if GPG key is present in secrets
          gpg-sign: ${{ steps.import_gpg.outputs.keyid }}
        continue-on-error: true

      # 4. Upload APK & Flatpak to the compiled Tagged Release
      - name: Upload APK and Flatpak release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            KyberPipe.flatpak
          tag_name: ${{ github.ref_name }}
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
