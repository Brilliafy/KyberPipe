name: Kyberpipe Multi-Target CI/CD & Automated Releases

on:
  push:
    branches: [ main, feature/* ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  rust-check-and-test:
    name: Rust Core & Property Tests (x86_64 / ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Formatting & Clippy Lints
        run: |
          cargo fmt --check
          cargo clippy --workspace -- -D warnings

      - name: Run Core Unit & Proptest Property Tests
        run: cargo test --workspace

  desktop-frontend-check:
    name: Vue 3 / Tauri Desktop Build & Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Dependencies & Build Frontend
        run: |
          cd desktop-app
          npm install
          npm run build

  android-check:
    name: Android Companion Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Lint & Test
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew lint testDebugUnitTest

  build-and-release:
    name: Compile & Sign Release Artifacts
    needs: [rust-check-and-test, desktop-frontend-check, android-check]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Ubuntu packages for Tauri dependencies
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. Compile Android APK (Release and sign)
      - name: Build Android Release APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          # Optional gradle signing flags if configured in build.gradle
          RELEASE_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          RELEASE_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Sign Android APK
        uses: rtsypin/sign-android-release@v4
        id: sign_app
        with:
          releaseDirectory: android-app/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # Fallback to upload unsigned if secrets are not set
        continue-on-error: true

      # 2. Compile Tauri Desktop App (.deb, .AppImage)
      - name: Build Tauri Desktop release bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: desktop-app
          tagName: ${{ github.ref_name }}
          releaseName: 'Kyberpipe Release ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false

      # 3. Compile Flatpak package
      - name: Set up Flatpak builder dependencies
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak Bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Kyberpipe.flatpak
          manifest-path: flatpak/org.kyberpipe.Kyberpipe.yaml
          repository-name: flathub
          run-tests: false
          # GPG signs flatpak if GPG key is present in secrets
          gpg-sign: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        continue-on-error: true

      # 4. Upload APK & Flatpak to the compiled Tagged Release
      - name: Upload APK and Flatpak release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            Kyberpipe.flatpak
          tag_name: ${{ github.ref_name }}
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
